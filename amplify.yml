version: 1
applications:
  - frontend:
      phases:
        preBuild:
          commands:
            - npm install --legacy-peer-deps
            # Hosting にバックエンド未連携のときはデモモード用スタブを作成
            - |
              if [ ! -f amplify_outputs.json ]; then
                echo '{}' > amplify_outputs.json
              fi
        build:
          commands:
            - npm run build
      artifacts:
        baseDirectory: .next
        files:
          - "**/*"
      cache:
        paths:
          - node_modules/**/*
          - .next/cache/**/*
    appRoot: .
